name: R Script Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-r:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: 'latest'

    - name: Install dependencies
      run: |
        Rscript -e 'install.packages(c("tidyverse","ggplot2","jsonlite","readxl"))'

    - name: Lint R scripts
      run: |
        Rscript -e 'install.packages("lintr"); lintr::lint_dir()'

    - name: Run R CMD check
      run: |
        Rscript -e 'install.packages("devtools"); devtools::check()'

