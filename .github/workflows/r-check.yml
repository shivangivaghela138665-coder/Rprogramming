name: R Script Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-r:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
       with:
          r-version: 'latest'

      - name: Install dependencies
        run: |
          install.packages(c("remotes", "devtools"))
          remotes::install_deps(dependencies = TRUE)
        shell: Rscript {0}

      - name: Check R script
        run: |
          # Replace 'your_script.R' with the actual name of your script
          # Or use devtools::check() if you are building a package
          Rscript your_script.R 
        shell: bash
